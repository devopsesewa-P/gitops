apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops
  namespace: gitops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops
  template:
    metadata:
      labels:
        app: gitops
    spec:
      containers:
        - name: gitops
        image: devopsesewa/website:v1
        ports:
        - containerPort: 80
        imagePullPolicy: IfNotPresent
